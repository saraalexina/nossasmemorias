<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/solelua.png">
  <link rel="apple-touch-icon" href="images/solelua.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fac52b">
  <title>Login - Us💕</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="js/login.js"></script>

</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <h1 class="login-title">Bem-vinda ao nosso cantinho 💕</h1>
      
      <img src="./images/solelua.png" alt="Logo" class="login-logo">

      <div class="login-box">
        <h2><i class="fas fa-heart"></i> Login</h2>
        <input type="text" id="username" placeholder="Nome de usuário">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="login()">
          <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
        <div class="error" id="error" style="display: none;"></div>
      </div>
    </div>
  </div>

</body>
</html>
